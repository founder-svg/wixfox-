<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found – WixFox Digital Solutions</title>
<meta http-equiv="refresh" content="3;url=/">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060810;color:#F4F7FF;font-family:'Montserrat',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.wrap{max-width:480px;}
.fox{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
h1{font-size:80px;font-weight:900;color:#FF6B00;line-height:1;margin-bottom:8px;}
h2{font-size:22px;font-weight:700;margin-bottom:14px;}
p{font-size:14px;color:#637593;line-height:1.7;margin-bottom:28px;}
a{display:inline-block;background:#FF6B00;color:#fff;padding:13px 28px;border-radius:8px;text-decoration:none;font-weight:700;font-size:13px;}
a:hover{background:#cc5500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="fox">🦊</div>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist. You'll be redirected to the homepage in 3 seconds...</p>
  <a href="/">🏠 Go to Homepage</a>
</div>
</body>
</html>
